services:       # 定义所有服务容器
  app:          # 博客主应用服务
    build: .    # 使用当前目录下的 Dockerfile 构建镜像
    ports:      # 端口映射，将容器内的 3000 端口暴露到宿主机的 3000 端口
      - "3000:3000"  # 格式为 "宿主机端口:容器端口"
    env_file:   # 从 .env 文件读取环境变量，方便配置管理
      - .env    # 指定环境变量文件路径
    depends_on: # 依赖关系，确保 db 和 redis 先启动
      db:       # 依赖 db 服务
        condition: service_healthy  # 仅当 db 服务的健康检查通过后才启动 app
      redis:    # 依赖 redis 服务
        condition: service_started  # 当 redis 容器启动后即可启动 app
    volumes:    # 挂载卷，用于持久化上传的文件
      - uploads:/app/uploads  # 将命名卷 uploads 挂载到容器内的 /app/uploads 目录

  db:           # 数据库服务，使用 PostgreSQL
    image: postgres:16-alpine  # 使用官方 PostgreSQL 16 的 Alpine 轻量版镜像
    environment:               # 设置数据库初始化所需的环境变量
      POSTGRES_USER: ${DB_USER}         # 数据库用户名，从 .env 文件读取
      POSTGRES_PASSWORD: ${DB_PASSWORD} # 数据库密码，从 .env 文件读取
      POSTGRES_DB: ${DB_NAME}           # 数据库名称，从 .env 文件读取
    volumes:     # 数据持久化
      - pgdata:/var/lib/postgresql/data  # 将命名卷 pgdata 挂载到 PostgreSQL 数据目录
    healthcheck: # 健康检查，用于判断数据库是否就绪
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]  # 执行 pg_isready 命令检查数据库连接
      interval: 10s  # 每 10 秒执行一次检查
      timeout: 5s    # 每次检查的超时时间为 5 秒
      retries: 5     # 连续失败 5 次后视为不健康

  redis:       # 缓存和会话存储服务
    image: redis:7-alpine  # 使用官方 Redis 7 的 Alpine 轻量版镜像
    volumes:    # 数据持久化
      - redisdata:/data  # 将命名卷 redisdata 挂载到 Redis 数据目录

volumes:        # 定义命名卷，用于数据持久化和服务间共享
  pgdata:       # PostgreSQL 数据卷
  redisdata:    # Redis 数据卷
  uploads:      # 用户上传文件卷
