<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  body { font-family: Arial; text-align: center; background: #faf8ef; color: #776e65; }
  h1 { font-size: 50px; margin: 10px 0; }
  .scores { display: flex; justify-content: center; gap: 20px; margin: 10px 0; }
  .score-box { background: #bbada0; color: white; padding: 10px 20px; border-radius: 5px; font-weight: bold; }
  #board { display: grid; grid-template-columns: repeat(4, 100px); grid-template-rows: repeat(4, 100px); gap: 10px; justify-content: center; margin: 20px auto; background: #bbada0; border-radius: 8px; padding: 10px; width: max-content; }
  .cell { background: #cdc1b4; border-radius: 6px; font-size: 36px; font-weight: bold; display: flex; align-items: center; justify-content: center; color: #776e65; }
  .cell[data-value="2"] { background: #eee4da; }
  .cell[data-value="4"] { background: #ede0c8; }
  .cell[data-value="8"] { background: #f2b179; color: white; }
  .cell[data-value="16"] { background: #f59563; color: white; }
  .cell[data-value="32"] { background: #f67c5f; color: white; }
  .cell[data-value="64"] { background: #f65e3b; color: white; }
  .cell[data-value="128"] { background: #edcf72; color: white; font-size: 32px; }
  .cell[data-value="256"] { background: #edcc61; color: white; font-size: 32px; }
  .cell[data-value="512"] { background: #edc850; color: white; font-size: 32px; }
  .cell[data-value="1024"] { background: #edc53f; color: white; font-size: 28px; }
  .cell[data-value="2048"] { background: #edc22e; color: white; font-size: 28px; }
  button { padding: 10px 20px; font-size: 18px; background: #8f7a66; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 10px; }
</style>
</head>
<body>
  <h1>2048</h1>
  <div class="scores">
    <div class="score-box"><div>分数</div><div id="score">0</div></div>
    <div class="score-box"><div>最高分</div><div id="best">0</div></div>
  </div>
  <div id="board"></div>
  <button onclick="newGame()">新游戏</button>
  <p>方向键移动，相同数字合并</p>
  <script>
    let board = [];
    let score = 0;
    let best = 0;
    const size = 4;

    function init() {
      board = Array.from({ length: size }, () => Array(size).fill(0));
      score = 0;
      addRandomTile();
      addRandomTile();
      renderBoard();
      updateScore();
    }

    function addRandomTile() {
      const empty = [];
      for (let r = 0; r < size; r++)
        for (let c = 0; c < size; c++)
          if (board[r][c] === 0) empty.push([r, c]);
      if (empty.length) {
        const [r, c] = empty[Math.floor(Math.random() * empty.length)];
        board[r][c] = Math.random() < 0.9 ? 2 : 4;
      }
    }

    function renderBoard() {
      const boardEl = document.getElementById('board');
      boardEl.innerHTML = '';
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          const val = board[r][c];
          if (val) {
            cell.textContent = val;
            cell.dataset.value = val;
          }
          boardEl.appendChild(cell);
        }
      }
    }

    function updateScore() {
      document.getElementById('score').textContent = score;
      if (score > best) {
        best = score;
        localStorage.setItem('best2048', best);
      }
      document.getElementById('best').textContent = best;
    }

    // 核心：向左滑动并合并一行
    function slideAndMerge(row) {
      let arr = row.filter(v => v !== 0);          // 去零
      for (let i = 0; i < arr.length - 1; i++) {
        if (arr[i] === arr[i + 1]) {
          arr[i] *= 2;
          score += arr[i];
          arr.splice(i + 1, 1);
        }
      }
      while (arr.length < size) arr.push(0);      // 补齐
      return arr;
    }

    // 比较两数组是否不同
    function isDifferent(a, b) {
      for (let i = 0; i < size; i++)
        if (a[i] !== b[i]) return true;
      return false;
    }

    function move(direction) {
      const oldBoard = board.map(row => [...row]);
      let moved = false;

      if (direction === 'left') {
        for (let r = 0; r < size; r++) {
          const oldRow = board[r];
          const newRow = slideAndMerge(board[r]);
          board[r] = newRow;
          if (isDifferent(oldRow, newRow)) moved = true;
        }
      } else if (direction === 'right') {
        for (let r = 0; r < size; r++) {
          const reversed = [...board[r]].reverse();
          const newRow = slideAndMerge(reversed).reverse();
          if (isDifferent(board[r], newRow)) moved = true;
          board[r] = newRow;
        }
      } else if (direction === 'up') {
        for (let c = 0; c < size; c++) {
          const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
          const newCol = slideAndMerge(col);
          if (isDifferent(col, newCol)) moved = true;
          for (let r = 0; r < size; r++) board[r][c] = newCol[r];
        }
      } else if (direction === 'down') {
        for (let c = 0; c < size; c++) {
          const col = [board[3][c], board[2][c], board[1][c], board[0][c]]; // 取反序
          const newCol = slideAndMerge(col).reverse();                       // 合并后再反序回来
          const finalCol = [newCol[3], newCol[2], newCol[1], newCol[0]];     // 恢复到原列顺序
          if (isDifferent([board[0][c], board[1][c], board[2][c], board[3][c]], finalCol)) moved = true;
          for (let r = 0; r < size; r++) board[r][c] = finalCol[r];
        }
      }

      if (moved) {
        addRandomTile();
        renderBoard();
        updateScore();
        if (isGameOver()) setTimeout(() => alert('游戏结束！'), 100);
      }
    }

    function isGameOver() {
      for (let r = 0; r < size; r++)
        for (let c = 0; c < size; c++) {
          if (board[r][c] === 0) return false;
          if (r < size - 1 && board[r][c] === board[r + 1][c]) return false;
          if (c < size - 1 && board[r][c] === board[r][c + 1]) return false;
        }
      return true;
    }

    // 键盘控制
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); move('left'); }
      else if (e.key === 'ArrowRight') { e.preventDefault(); move('right'); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); move('up'); }
      else if (e.key === 'ArrowDown') { e.preventDefault(); move('down'); }
    });

    // 触屏控制（简单实现）
    let touchStart = null;
    document.addEventListener('touchstart', e => {
      touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    });
    document.addEventListener('touchend', e => {
      if (!touchStart) return;
      const dx = e.changedTouches[0].clientX - touchStart.x;
      const dy = e.changedTouches[0].clientY - touchStart.y;
      if (Math.abs(dx) > Math.abs(dy)) {
        move(dx > 0 ? 'right' : 'left');
      } else {
        move(dy > 0 ? 'down' : 'up');
      }
      touchStart = null;
    });

    function newGame() {
      init();
    }

    // 读取最高分
    best = parseInt(localStorage.getItem('best2048') || '0');
    init();
  </script>
</body>
</html>
